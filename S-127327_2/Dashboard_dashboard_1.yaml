# Release version:      26.3.0-SNAPSHOT

---
apiVersion: xl-release/v1
kind: Templates
metadata:
  path: /
  home: FolderA/FolderB/FolderC
spec:
- name: Dashboard_1
  type: xlrelease.BlankDashboard
  owner: admin
  tiles:
  - name: Active releases
    type: live.ReleasesTile
    row: 0
    col: 0
    filters:
    - type: xlrelease.FolderFilter
      folder: ./
    - type: xlrelease.DateFilter
  - name: Active releases by risk
    type: live.ReleasesByRiskTile
    row: 0
    col: 2
    filters:
    - type: xlrelease.DateFilter
    - type: xlrelease.CompositeFilter
      filters:
      - type: xlrelease.FolderFilter
        folder: ./
  - name: Active releases by status
    type: live.ReleasesByStatusTile
    row: 0
    col: 4
    filters:
    - type: xlrelease.DateFilter
    - type: xlrelease.CompositeFilter
      filters:
      - type: xlrelease.FolderFilter
        folder: ./
  - name: Analytics
    type: xlrelease.AnalyticsCarouselTile
    row: 2
    col: 0
  - name: Getting started
    type: xlrelease.AnnouncementTile
    row: 2
    col: 3
  - name: Applications
    type: xlrelease.ApplicationTile
    row: 4
    col: 0
  - name: Avg. release duration
    type: xlrelease.AvgReleaseDurationTile
    row: 4
    col: 3
